# ── Listening ────────────────────────────────────────────────────────────────
listening-port=3478
tls-listening-port=5349

# Render assigns a PORT env var — we use 3478 as default but Render will map it
# Also listen on all interfaces
listening-ip=0.0.0.0

# ── Realm & credentials ───────────────────────────────────────────────────────
realm=devspace.turn
server-name=devspace-turn

# Static auth credentials — set via environment variables in Render
# Format: user=username:password
# We use the env var approach via the CMD below

# ── Security ─────────────────────────────────────────────────────────────────
# Only relay, don't act as a STUN-only server for strangers
# fingerprint
lt-cred-mech

# ── Performance ──────────────────────────────────────────────────────────────
no-multicast-peers
no-loopback-peers
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=172.16.0.0-172.31.255.255

# ── Logging ───────────────────────────────────────────────────────────────────
log-file=stdout
verbose
